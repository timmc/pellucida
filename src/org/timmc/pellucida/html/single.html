<head>
  <link rel="stylesheet" href="/css/page/single.css">
</head>

<div class="std-body" stitch="single">
  <a class="view-fullsize" title="View at original size">
    <img alt="midsize thumbnail">
  </a>
  <dl class="metadata">
    <dt>Date</dt><dd class="md-date"></dd>
    <dt>Angle</dt><dd class="md-angle"></dd>
    <dt>Dimensions</dt><dd class="md-dim"></dd>
  </dl>
  <p class="description"></p>

  <h2>Tags</h2>
  <dl id="tags">
    <group>
      <dt class="category">Content</dt>
      <dd class="tag">
        <span class="tagname">red</span>
        <a class="tt">filter</a>
        <span class="implicit" title="Implied tag">*</span>
      </dd>
    </group>
  </dl>
</div>
